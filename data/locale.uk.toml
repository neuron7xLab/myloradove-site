[about]
chapter   = "I · Село"
title_l1  = "Полтавське село"
title_l2  = "старої школи."
lede      = "Садибна забудова, просторі городи, охайні вулиці. Через Милорадове пролягає автошлях <b>Т-1707</b>, за околицею починаються чорноземи Полтавської рівнини, а поруч — ландшафтний заказник місцевого значення <em>«Великий і Малий Лиман»</em>."
p1        = "Село розташоване на лівому березі річки Ковжижі, лівої притоки Ворскли, що в посуху пересихає. За кілометр нижче за течією — село Глобівка; вище — Ковжижа; на протилежному березі — Чоботарі. Далі, за полями, — соснові ліси Борівського урочища."
p2        = "Милорадове входить до Великорублівської сільської громади Полтавського району і налічує <b>1&nbsp;059</b> мешканців. Історична назва — <em>Новоселівка</em>. Поштовий індекс — 38630."

[nature]
