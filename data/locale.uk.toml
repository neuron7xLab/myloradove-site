[history]
chapter  = "III · Історія"
title_l1 = "Від хутора"
title_l2 = "до громади."
aria     = "Хронологія села"
lede     = "Хронологія села спирається на офіційні джерела: статтю про Милорадове в українській Вікіпедії, КАТОТТГ-довідник, розпорядження Кабінету Міністрів України № 721-р від 12 червня 2020 року, історичні військово-топографічні карти Шуберта (1826—1840) і відкриті дані Великорублівської сільської громади."
y1       = "до 1816"
h1       = "Передісторія"
p1       = "Землі лівобережжя <b>Ворскли</b> у XVII—XVIII ст. належали до полків Гетьманщини. Після Російсько-турецької війни 1711 року три брати Милорадовичі — Михайло, Гаврило та Олександр — отримали маєтки на цих теренах. <em>Милорадовичі</em> — український козацько-старшинський, дворянський і згодом графський рід, відомий з XV ст.; за родинними переказами походив від сербських графів з Герцеговини."
y2       = "близько 1816"
h2       = "Заснування хутора"
p2       = "Поселення постало як <b>хутір</b> — невеликий маєток роду Милорадовичів. Місце вибрано на лівому березі річки <em>Ковжижі</em> — лівої притоки Ворскли, серед чорноземів Полтавської рівнини. Історична назва — <em>Новоселівка</em>."
y3       = "1826—1840"
h3       = "Карти Шуберта"
p3       = "На «Спеціальній карті Західної частини Російської імперії», укладеній під керівництвом генерала Ф. Ф. Шуберта, поселення вже позначене як <em>«хутір Милорадовича»</em> — перше офіційне картографічне підтвердження."
y4       = "друга пол. XIX ст."
h4       = "Полтавська культура"
p4       = "Епоха <em>Василя Петровича Милорадовича</em> (1846—1911) — полтавського юриста, фольклориста й етнографа з того ж роду. Полтавщина цієї доби стає одним з осередків української етнографії; народна культура села формується в ширшому контексті фіксації звичаїв, говірок і обрядів."
y5       = "1923—1991"
h5       = "Радянська доба"
p5       = "Колективізація, утворення колгоспу, спорудження сільської школи та Будинку культури. Після Другої світової війни довкола села висаджено соснові насадження — нині <b>Борівський ботанічний заказник</b> і ландшафтний заказник <em>«Великий і Малий Лиман»</em>."
y6       = "1991—2020"
h6       = "Незалежна Україна"
p6       = "Після відновлення незалежності село залишається у складі <b>Котелевського району</b> Полтавської області. Зберігаються заклад загальної середньої освіти, дитячий садок «Ластівка», Будинок культури, фельдшерсько-акушерський пункт."
y7       = "12 червня 2020"
h7       = "Великорублівська громада"
p7       = "Розпорядженням Кабінету Міністрів України № 721-р шість сільрад — <b>Великорублівська</b>, Ковалевська, Козлівщинська, Малорублівська, Микілківська і <b>Милорадівська</b> — об'єднано у Великорублівську сільську територіальну громаду з адмінцентром у Великій Рублівці. Громада нараховує <b>29</b> сіл, <b>4&nbsp;503</b> мешканців, <b>389 км²</b>."
y8       = "19 липня 2020"
h8       = "Полтавський район"
p8       = "Постановою Верховної Ради ліквідовано Котелевський район, його територія увійшла до новоутвореного <b>Полтавського району</b>. Милорадове відтоді — у Полтавському районі Полтавської області."
y9       = "сьогодні"
h9       = "Сучасне село"
p9       = "Тиха громада на <b>1&nbsp;059</b> мешканців, поштовий індекс <em>38630</em>. Сусідні поселення: <b>Ковжижа</b> вище за течією, <b>Глобівка</b> за кілометр нижче, <b>Чоботарі</b> на протилежному березі. Школа, садок, СБК, ФАП, амбулаторія загальної практики — щодення тримається людьми."

