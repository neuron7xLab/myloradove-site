img_main_alt  = "Ставок із дзеркальним відбиттям неба й хмар у Милорадовому"
cap_main  = "Великий ставок на світанку. Риба ходить під самою поверхнею."
img_l_alt = "Ставок серед очеретів, літній вечір"
cap_l     = "Очерети шумлять у сутінках."
img_r_alt = "Деревʼяна альтанка на березі ставу серед дерев"
