# ── Події села Милорадове ──────────────────────────────────────────
# Цей файл — єдине джерело істини для розділу «Події» на сайті.
# Редагуй тільки його; build.py регенерує HTML + JSON-LD + events.ics.
#
# Після редагування:
#   1.  git commit (або edit on GitHub via web UI)
#   2.  Cloudflare Pages автоматично збудує preview
#   3.  перевір preview-посилання → merge → production
#
# Формат дати: 2026-05-15   (ISO-8601)
# Формат часу: 18:00         (24h, локальний)
# Поле `cta_url` і `cta_label` опційні — якщо є подія з квитками / реєстрацією.
#
# Видалення старої події: просто видали її запис. Минулі події build.py
# ховає автоматично у колапсний <details> розділ.

