[about]
chapter   = "I · The village"
title_l1  = "An old-school"
title_l2  = "Poltava village."
lede      = "Traditional homesteads, wide kitchen gardens, clean streets. Road <b>T-1707</b> runs through Myloradove; beyond it begin the black-earth soils of the Poltava Plain, and nearby lies the <em>«Velykyi i Malyi Lyman»</em> landscape reserve."
p1        = "The village sits on the left bank of the Kovzhyzha — a left tributary of the Vorskla that dries out in summer. A kilometre downstream is Hlobivka; upstream, the village of Kovzhyzha; across the river, Chobotari. Beyond the fields stretch the pine forests of the Borivske urochyshche."
p2        = "Myloradove belongs to the Velyki Rubli rural hromada of Poltava district and is home to <b>1&nbsp;059</b> people. Its historical name is <em>Novoselivka</em>. Postal code — 38630."

[nature]
chapter   = "II · Water and land"
