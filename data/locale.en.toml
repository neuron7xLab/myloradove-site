chapter   = "II · Water and land"
title_l1  = "A quiet river,"
title_l2  = "ponds that brim."
img_main_alt = "A pond reflecting sky and clouds in Myloradove"
cap_main  = "The great pond at dawn. Fish drift just under the surface."
img_l_alt = "A reed-lined pond at dusk in summer"
cap_l     = "Reeds rustle at dusk."
img_r_alt = "A wooden gazebo on the bank of a pond among trees"
cap_r     = "A gazebo on the bank — people come here to fish and listen to the quiet."

[history]
chapter  = "III · History"
title_l1 = "From khutir"
title_l2 = "to hromada."
aria     = "Village timeline"
y1       = "c. 1816"
h1       = "Foundation"
p1       = "The village grew out of a khutir — a small homestead — of the Myloradovych family, Poltava-region landowners. Their surname gave the place its name."
y2       = "1826—1840"
h2       = "Schubert's maps"
p2       = "On the Russian Imperial military-topographic maps surveyed under F. F. Schubert, the settlement appears as <em>«Myloradovych's khutir»</em>."
y3       = "20th century"
h3       = "The Soviet period"
p3       = "The collective-farm era: a school and a House of Culture were built. After the Second World War, pine groves were planted around the village — today protected as landscape reserves."
y4       = "until 2020"
h4       = "Kotelva district"
p4       = "Administratively, the village belonged to Kotelva district of Poltava oblast."
y5       = "2020 — present"
h5       = "A new hromada"
p5       = "Following Ukraine's decentralisation reform, Myloradove joined the <b>Velyki Rubli rural hromada</b> of Poltava district."

[culture]
chapter  = "IV · Culture"
title_l1 = "Song and dance —"
title_l2 = "the heart of Myloradove."
lede     = "The House of Culture is the real heart of the village. Everyone gathers here — elders and children alike — for Village Day, concerts, and traditional evening gatherings (vechornytsi). Poltava customs, folk crafts, songs — all of it living, passed from hand to hand."
img_alt  = "A wooden sculpture of a guitar in the village park of Myloradove — a symbol of song and dance"
cap      = "The culture park. The guitar stands as though it had just been playing."
quote    = "«If a village still sings — the village still lives.<br>Myloradove always sings.»"

