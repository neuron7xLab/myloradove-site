img_r_alt = "A wooden gazebo on the bank of a pond among trees"
cap_r     = "A gazebo on the bank — people come here to fish and listen to the quiet."

[history]
chapter  = "III · History"
title_l1 = "From khutir"
title_l2 = "to hromada."
aria     = "Village timeline"
lede     = "This timeline draws on official sources: the Ukrainian Wikipedia article on Myloradove, the KATOTTH register, Cabinet of Ministers of Ukraine resolution No. 721-r of 12 June 2020, the historical Schubert military-topographic maps (1826—1840), and open records of the Velyki Rubli rural hromada."
y1       = "before 1816"
h1       = "Pre-history"
p1       = "Through the 17th and 18th centuries the left bank of the <b>Vorskla</b> belonged to the Cossack Hetmanate. After the 1711 Russo-Turkish War three Myloradovych brothers — Mykhailo, Havrylo and Oleksandr — were granted estates here. The <em>Myloradovych</em> family was a Ukrainian Cossack-officer noble (later comital) line known from the 15th century; according to the family tradition it descended from Serbian counts of Herzegovina."
y2       = "c. 1816"
h2       = "Founding the khutir"
p2       = "The settlement began as a <b>khutir</b> — a small homestead — of the Myloradovych family. The site was chosen on the left bank of the <em>Kovzhyzha</em>, a left tributary of the Vorskla, on the black-earth soils of the Poltava plain. Its historical name is <em>Novoselivka</em>."
y3       = "1826—1840"
h3       = "Schubert's maps"
p3       = "On the <em>Special Map of the Western Russian Empire</em> compiled under General F. F. Schubert, the settlement is already labelled <em>«Myloradovych's khutir»</em> — its first formal cartographic appearance."
y4       = "late 19th c."
h4       = "Poltava ethnography"
p4       = "The era of <em>Vasyl Petrovych Myloradovych</em> (1846—1911), a Poltava lawyer, folklorist and ethnographer of the same family. Poltava region in this period becomes one of the centres of Ukrainian ethnography; village customs, dialects and rites are recorded in this wider scholarly context."
y5       = "1923—1991"
h5       = "Soviet period"
p5       = "Collectivisation, the formation of a kolkhoz, the building of the village school and House of Culture. After the Second World War, pine groves were planted around the village — today the <b>Borivske botanical reserve</b> and the <em>«Velykyi i Malyi Lyman»</em> landscape reserve."
y6       = "1991—2020"
h6       = "Independent Ukraine"
p6       = "After the restoration of Ukrainian independence the village remains part of <b>Kotelva district</b> of Poltava oblast. The school, the «Lastivka» kindergarten, the House of Culture, the feldsher-midwife point and the family-medicine clinic continue to operate."
y7       = "12 June 2020"
h7       = "Velyki Rubli hromada"
p7       = "Cabinet of Ministers resolution No. 721-r merges six village councils — <b>Velykorublivska</b>, Kovalevska, Kozlivshchynska, Malorublivska, Mikilkivska and <b>Myloradivska</b> — into the Velyki Rubli rural territorial community, with its administrative centre in Velyka Rublivka. The hromada counts <b>29</b> villages, <b>4&nbsp;503</b> residents and <b>389 km²</b>."
y8       = "19 July 2020"
h8       = "Poltava district"
p8       = "The Verkhovna Rada abolishes Kotelva district; its territory becomes part of the new <b>Poltava district</b>. Myloradove has been part of Poltava district, Poltava oblast, ever since."
y9       = "today"
h9       = "The village now"
p9       = "A quiet community of <b>1&nbsp;059</b> residents, postal code <em>38630</em>. Neighbouring settlements: <b>Kovzhyzha</b> upstream, <b>Hlobivka</b> a kilometre downstream, <b>Chobotari</b> across the river. School, kindergarten, House of Culture, feldsher-midwife point, family-medicine outpatient clinic — everyday life is held together by people."

[culture]
chapter  = "IV · Culture"
title_l1 = "Song and dance —"
title_l2 = "the heart of Myloradove."
lede     = "The House of Culture is the real heart of the village. Everyone gathers here — elders and children alike — for Village Day, concerts, and traditional evening gatherings (vechornytsi). Poltava customs, folk crafts, songs — all of it living, passed from hand to hand."
img_alt  = "A wooden sculpture of a guitar in the village park of Myloradove — a symbol of song and dance"
cap      = "The culture park. The guitar stands as though it had just been playing."
quote    = "«If a village still sings — the village still lives.<br>Myloradove always sings.»"

